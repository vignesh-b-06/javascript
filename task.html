<!DOCTYPE html>
<html>
<head>
    <title>Employee Array</title>
</head>
<body>

<script>
    var employees = [
        { name: "Arun", age: 25, designation: "Developer" },
        { name: "Priya", age: 27, designation: "Tester" },
        { name: "Rahul", age: 30, designation: "Manager" },
        { name: "Divya", age: 24, designation: "HR" }
    ];

    for (var i = 0; i < employees.length; i++) {
        console.log( employees[i].name);
        console.log( employees[i].age);
        console.log( employees[i].designation);
    }
</script>

</body>
</html>
</body>
</html>
